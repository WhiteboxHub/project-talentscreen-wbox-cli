  - "Modern tech stack (Python, TypeScript, Go)"

red_flags:
  - "C++"
  - "Embedded Systems"
  - "Clearance required"
  - "Contract role"

# Core answers that override standard logic
overrides:
  visa_sponsorship: false
  relocation: false
