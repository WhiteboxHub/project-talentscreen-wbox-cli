# User profile mapping to guide LLM & evaluation

target_roles:
  - "AI Engineer"
  - "Machine Learning Engineer"
  - "Software Engineer"
  - "Backend Engineer"

baseline_salary: 120000

north_star: "Roles focused on building agentic AI features, utilizing LLMs, or RAG systems."

must_haves:
